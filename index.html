
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>三家庭旅游记账</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23f7f9f8'/%3E%3Ccircle cx='24' cy='26' r='13' fill='%23a9ceb5'/%3E%3Ccircle cx='40' cy='25' r='13' fill='%23b9c9e6'/%3E%3Ccircle cx='32' cy='40' r='13' fill='%23efc2bf'/%3E%3C/svg%3E" />
    <!-- 手动缓存戳：GitHub Pages 上线后如果样式没刷新，更新这里的 v 值。 -->
    <link rel="stylesheet" href="./styles.css?v=phase6-dark-20260702" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">旅行账本</p>
          <h1 id="currentLedgerTitle">旅行账本</h1>
        </div>
        <div class="header-actions">
          <span class="sync-status" id="syncStatus">本地账本</span>
          <button class="ghost-button" id="openSettingsButton" type="button">设置</button>
        </div>
      </header>

      <div class="app-view" id="ledgerView">
        <section class="summary-band" aria-label="账本总览">
          <div class="metric primary" id="totalMetric">
            <span>总支出</span>
            <strong id="totalAmount">¥0.00</strong>
          </div>
          <div class="metric">
            <span>人均费用</span>
            <strong id="shareAmount">¥0.00</strong>
          </div>
          <div class="metric">
            <span>账单笔数</span>
            <strong id="expenseCount">0</strong>
          </div>
        </section>

        <div class="workspace">
          <section class="entry-panel" aria-label="记一笔账">
            <div class="section-heading">
              <h2>记一笔账</h2>
            </div>

            <form id="expenseForm" class="expense-form" novalidate>
              <fieldset class="payer-field full-row" id="payerField">
                <legend>付款家庭</legend>
                <div id="familyRoster" class="family-roster" aria-label="选择付款家庭"></div>
                <p class="field-error" id="payerError" role="alert"></p>
              </fieldset>

              <label class="amount-label full-row" id="amountLabel">
                <span>金额</span>
                <span class="amount-field">
                  <span class="currency-mark">¥</span>
                  <input id="amountInput" name="amount" type="text" inputmode="decimal" autocomplete="off" placeholder="0.00" />
                </span>
              </label>

              <fieldset class="category-picker full-row">
                <legend>类别</legend>
                <input id="categoryInput" name="category" type="hidden" />
                <div id="categoryChips" class="category-chips selectable-category-chips" aria-label="选择类别"></div>
                <div id="categoryForm" class="category-form inline-category-form" aria-label="新增类别">
                  <input id="newCategoryInput" type="text" maxlength="12" placeholder="新增类别" />
                  <button class="secondary-button" type="button">添加</button>
                </div>
              </fieldset>

              <section class="split-scope full-row" id="splitScope" aria-label="分摊范围">
                <button class="split-scope-toggle" id="splitScopeToggle" type="button" aria-expanded="false" aria-controls="splitScopePanel">
                  <span>分摊范围</span>
                  <strong id="splitScopeSummary">全部家庭 · 按人数</strong>
                </button>
                <div class="split-scope-panel" id="splitScopePanel" hidden>
                  <div class="split-mode-buttons" id="splitModeButtons" aria-label="选择分摊范围"></div>
                  <div class="split-family-choices" id="splitFamilyChoices" aria-label="选择参与分摊的家庭"></div>
                  <div class="split-custom-amounts" id="splitCustomAmounts" aria-label="分别填写承担金额"></div>
                </div>
              </section>

              <label class="date-label">
                <span>日期</span>
                <input id="dateInput" name="date" type="date" />
              </label>

              <label class="note-label full-row">
                <span>备注</span>
                <input id="noteInput" name="note" type="text" maxlength="80" placeholder="例如：高铁票、晚餐、酒店" />
              </label>

              <div class="edit-banner full-row" id="editBanner" hidden>
                <span>正在编辑这笔账单</span>
                <button class="inline-button" id="cancelEditButton" type="button">取消</button>
              </div>

              <p class="form-error" id="formError" role="alert"></p>
              <button class="primary-button full-row" type="submit"><span class="button-label" id="submitButtonLabel">添加账单</span></button>
            </form>

          </section>

          <section class="insights-panel" aria-label="统计和平账">
            <div class="section-heading">
              <h2>统计和平账</h2>
            </div>

            <div class="stats-grid">
              <section class="stat-block">
                <h3>各家已付</h3>
                <div id="paidByFamily" class="stack-list"></div>
              </section>

              <section class="stat-block category-summary-block" id="categorySummaryBlock">
                <h3>类别汇总</h3>
                <div id="categorySummary" class="stack-list"></div>
              </section>
            </div>

            <section class="settlement-block">
              <h3>平账建议</h3>
              <div id="settlementList" class="settlement-list"></div>
            </section>
          </section>
        </div>

        <section class="ledger-section" aria-label="账单列表">
          <div class="section-heading">
            <div class="ledger-heading-copy">
              <h2>账单列表</h2>
              <span class="ledger-filter-summary" id="ledgerFilterSummary" hidden></span>
            </div>
            <div class="ledger-controls" aria-label="账单筛选">
              <select id="ledgerFamilyFilter" aria-label="按家庭筛选"></select>
              <select id="ledgerCategoryFilter" aria-label="按类别筛选"></select>
              <button class="secondary-button compact-button" id="clearLedgerFiltersButton" type="button" hidden>清除筛选</button>
            </div>
          </div>
          <div id="ledgerList" class="ledger-list"></div>
        </section>
      </div>

      <section class="settings-view" id="settingsView" hidden aria-label="设置" aria-modal="true" role="dialog">
        <button class="settings-backdrop" id="settingsBackdrop" type="button" aria-label="关闭设置"></button>
        <aside class="settings-drawer">
          <div class="settings-hero">
            <div>
              <p class="eyebrow">偏好与数据</p>
              <h2>设置</h2>
            </div>
            <button class="ghost-button" id="closeSettingsButton" type="button">完成</button>
          </div>

          <div class="settings-grid">
            <section class="settings-panel">
              <div class="settings-panel-title">
                <h3>当前账本</h3>
                <button class="secondary-button compact-button" id="openLedgerManagerButton" type="button">账本管理</button>
              </div>
              <form id="ledgerNameForm" class="ledger-name-form">
                <input id="currentLedgerNameInput" type="text" maxlength="24" placeholder="账本名称" />
                <button class="secondary-button" id="saveLedgerNameButton" type="submit">保存名称</button>
              </form>
              <div id="currentLedgerSummary" class="current-ledger-summary"></div>
            </section>

            <section class="settings-panel">
              <div class="settings-panel-title">
                <h3>家庭与规则</h3>
                <span class="readonly-badge">人数可调</span>
              </div>
              <p class="settings-note">家庭名称固定，分摊金额按各家庭人数占总人数的比例计算。</p>
              <div id="settingsFamilyList" class="settings-family-list"></div>
              <div class="settings-rule-list">
                <div class="settings-rule">
                  <span>分摊方式</span>
                  <strong>按家庭人数</strong>
                </div>
                <div class="settings-rule">
                  <span>货币</span>
                  <strong>人民币 ¥</strong>
                </div>
                <div class="settings-rule">
                  <span>保存位置</span>
                  <strong id="storageModeLabel">当前浏览器</strong>
                </div>
              </div>
            </section>

            <section class="settings-panel">
              <h3>类别管理</h3>
              <form id="settingsCategoryForm" class="category-form settings-category-form">
                <input id="settingsNewCategoryInput" type="text" maxlength="12" placeholder="新增类别" />
                <button class="secondary-button" type="submit">添加</button>
              </form>
              <div id="settingsCategoryChips" class="category-chips settings-category-chips"></div>
            </section>

            <section class="settings-panel">
              <h3>数据状态</h3>
              <div id="settingsDataSummary" class="settings-data-summary"></div>
              <div class="settings-action-stack">
                <button class="secondary-button" id="createCloudLedgerButton" type="button">创建云账本</button>
                <button class="secondary-button" id="copyShareLinkButton" type="button" hidden>复制邀请链接</button>
                <button class="secondary-button" id="exportCsvButton" type="button">导出 CSV</button>
                <button class="secondary-button" id="exportJsonButton" type="button">备份 JSON</button>
              </div>
              <button class="ghost-button danger settings-clear-button" id="settingsClearLedgerButton" type="button">清空账本</button>
            </section>
          </div>
        </aside>
      </section>

      <section class="ledger-management-view" id="ledgerManagementView" hidden aria-label="账本管理" aria-modal="true" role="dialog">
        <button class="ledger-management-backdrop" id="ledgerManagementBackdrop" type="button" aria-label="关闭账本管理"></button>
        <aside class="ledger-management-drawer">
          <div class="ledger-management-hero">
            <div>
              <p class="eyebrow">多次旅行</p>
              <h2>账本管理</h2>
            </div>
            <button class="ghost-button" id="closeLedgerManagerButton" type="button">完成</button>
          </div>

          <div class="ledger-management-tools">
            <form id="ledgerCreateForm" class="ledger-create-form">
              <input id="ledgerCreateNameInput" type="text" maxlength="24" placeholder="新账本名称" />
              <label class="checkbox-option">
                <input id="ledgerInheritSettingsInput" type="checkbox" checked />
                <span>沿用当前人数与类别</span>
              </label>
              <button class="secondary-button" type="submit">新建</button>
            </form>

            <form id="ledgerJoinForm" class="ledger-join-form">
              <input id="ledgerJoinInput" type="text" placeholder="粘贴云账本邀请链接" />
              <button class="secondary-button" type="submit">加入</button>
            </form>
          </div>

          <div id="ledgerManagerList" class="ledger-manager-list"></div>
        </aside>
      </section>

      <div class="mobile-submit-bar" id="mobileSubmitBar">
        <div class="mobile-submit-summary" id="mobileSubmitSummary">乐家 · 餐饮 · 今天</div>
        <button class="primary-button mobile-submit-button" id="mobileSubmitButton" type="button">
          <span class="button-label">添加账单</span>
        </button>
      </div>

      <section class="confirm-view" id="confirmView" hidden aria-label="确认操作" aria-modal="true" role="dialog">
        <button class="confirm-backdrop" id="confirmBackdrop" type="button" aria-label="取消"></button>
        <div class="confirm-dialog" role="document">
          <div>
            <p class="eyebrow" id="confirmEyebrow">请确认</p>
            <h2 id="confirmTitle">确认操作</h2>
          </div>
          <p id="confirmMessage" class="confirm-message"></p>
          <div class="confirm-actions">
            <button class="secondary-button" id="confirmCancelButton" type="button">取消</button>
            <button class="primary-button danger-action" id="confirmOkButton" type="button">确认</button>
          </div>
        </div>
      </section>

      <div class="toast-host" id="toastHost" aria-live="polite" aria-atomic="true"></div>
    </main>

    <!-- 手动缓存戳：发布后改了 JS 但浏览器仍用旧文件时，更新这里的 v 值。 -->
    <script src="./app.js?v=phase6-dark-20260702"></script>
  </body>
</html>
